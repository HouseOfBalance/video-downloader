<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex | Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' } // Xanh dương Pro
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0E14; color: #ffffff; overflow-x: hidden; }
        /* Background Glow tinh tế */
        .bg-glow {
            position: fixed; top: -10%; left: 50%; transform: translateX(-50%);
            width: 800px; height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; pointer-events: none;
        }
        /* Hiệu ứng mượt mà */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        /* Toast Animation */
        #toast { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); transform: translate(-50%, -20px); opacity: 0; }
        #toast.show { transform: translate(-50%, 20px); opacity: 1; }
        
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center">

    <div class="bg-glow"></div>

    <div id="toast" class="fixed top-0 left-1/2 z-50 flex items-center gap-3 px-6 py-3 rounded-full glass-panel pointer-events-none">
        <i class="ph-fill ph-check-circle text-green-400 text-xl" id="toastIcon"></i>
        <span id="toastMsg" class="font-medium text-sm">Action successful</span>
    </div>

    <main class="w-full max-w-4xl px-6 pt-24 pb-12 flex-1 flex flex-col items-center">
        
        <div class="text-center mb-10 fade-in">
            <div class="inline-flex items-center justify-center p-3 bg-brand-500/10 text-brand-500 rounded-2xl mb-4">
                <i class="ph-bold ph-download-simple text-3xl"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-4">
                Vortex <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Premium</span>
            </h1>
            <p class="text-gray-400 text-lg">High-fidelity video downloads. No watermarks. Pure quality.</p>
        </div>

        <div class="w-full relative fade-in" style="animation-delay: 0.1s;">
            <div class="glass-panel rounded-2xl p-2 flex flex-col md:flex-row items-center gap-2 transition-all duration-300 focus-within:border-brand-500/50 focus-within:bg-white/5">
                <i class="ph ph-link text-gray-400 text-2xl ml-3 hidden md:block"></i>
                <input type="text" id="urlInput" placeholder="Paste YouTube, TikTok, or Instagram link..." 
                    class="w-full bg-transparent border-none outline-none text-white px-4 py-4 md:py-3 placeholder-gray-500 text-lg">
                
                <button id="downloadBtn" class="w-full md:w-auto px-8 py-3.5 bg-brand-600 hover:bg-brand-500 text-white font-medium rounded-xl transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btnText">Analyze</span>
                    <i class="ph-bold ph-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="previewCard" class="w-full mt-6 glass-panel rounded-2xl p-4 md:p-6 hidden fade-in">
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <div class="relative w-full md:w-48 aspect-video rounded-xl overflow-hidden group">
                    <img id="thumbImg" src="" alt="Thumbnail" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                    <div class="absolute bottom-2 right-2 bg-black/80 backdrop-blur px-2 py-1 rounded text-xs font-medium" id="durationText">00:00</div>
                </div>
                <div class="flex-1 w-full">
                    <h3 id="videoTitle" class="text-xl font-semibold mb-2 line-clamp-2">Video Title</h3>
                    <div class="flex items-center gap-2 text-sm text-gray-400 mb-4">
                        <i class="ph-fill ph-check-circle text-brand-400"></i> Source verified
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-3">
                        <select id="qualitySelect" class="bg-white/10 border border-white/10 text-white text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block w-full p-2.5 outline-none appearance-none cursor-pointer">
                            <option value="video" class="bg-gray-900" selected>High Quality Video (MP4)</option>
                            <option value="audio" class="bg-gray-900">Audio Only (MP3)</option>
                        </select>
                        <button id="confirmDownloadBtn" class="w-full sm:w-auto px-6 py-2.5 bg-white text-black hover:bg-gray-200 font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
                            <i class="ph-bold ph-download-simple"></i> Download
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full mt-16 fade-in" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-gray-300 flex items-center gap-2">
                    <i class="ph ph-clock-counter-clockwise"></i> Recent Activity
                </h2>
                <button id="clearBtn" class="text-sm text-gray-500 hover:text-red-400 transition-colors hidden">Clear History</button>
            </div>
            <div id="recentList" class="flex flex-col gap-3">
                <div class="text-center text-gray-600 py-8 text-sm" id="emptyState">No recent downloads.</div>
            </div>
        </div>
    </main>

    <script>
        // --- DOM Elements ---
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const previewCard = document.getElementById('previewCard');
        const thumbImg = document.getElementById('thumbImg');
        const videoTitle = document.getElementById('videoTitle');
        const durationText = document.getElementById('durationText');
        const confirmDownloadBtn = document.getElementById('confirmDownloadBtn');
        const qualitySelect = document.getElementById('qualitySelect');
        const recentList = document.getElementById('recentList');
        const emptyState = document.getElementById('emptyState');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const toastIcon = document.getElementById('toastIcon');

        // --- State ---
        let currentUrl = "";
        let recentDownloads = JSON.parse(localStorage.getItem('premiumDownloads') || '[]');

        // --- Helpers ---
        const showToast = (message, type = 'success') => {
            toastMsg.textContent = message;
            if(type === 'success') {
                toastIcon.className = "ph-fill ph-check-circle text-green-400 text-xl";
            } else if (type === 'loading') {
                toastIcon.className = "ph ph-spinner animate-spin text-brand-400 text-xl";
            } else {
                toastIcon.className = "ph-fill ph-warning-circle text-red-400 text-xl";
            }
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        const renderRecent = () => {
            recentList.innerHTML = '';
            if (recentDownloads.length === 0) {
                recentList.appendChild(emptyState);
                clearBtn.classList.add('hidden');
                return;
            }
            clearBtn.classList.remove('hidden');
            
            recentDownloads.forEach(item => {
                const div = document.createElement('div');
                div.className = "glass-panel rounded-xl p-4 flex items-center justify-between group hover:bg-white/5 transition-colors";
                div.innerHTML = `
                    <div class="overflow-hidden w-3/4">
                        <p class="font-medium text-gray-200 truncate pr-4">${item.title}</p>
                        <p class="text-xs text-brand-400 mt-1 uppercase tracking-wider">${item.platform} • ${item.quality}</p>
                    </div>
                    <button onclick="removeRecent('${item.id}')" class="text-gray-600 hover:text-red-400 transition-colors">
                        <i class="ph-bold ph-trash text-xl"></i>
                    </button>
                `;
                recentList.appendChild(div);
            });
        };

        window.removeRecent = (id) => {
            recentDownloads = recentDownloads.filter(item => item.id !== id);
            localStorage.setItem('premiumDownloads', JSON.stringify(recentDownloads));
            renderRecent();
        };

        // --- Logic Nhận Diện URL (Nhanh) ---
        downloadBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (!url || !url.startsWith('http')) {
                showToast('Vui lòng nhập link hợp lệ (http/https)', 'error');
                return;
            }

            currentUrl = url;
            downloadBtn.disabled = true;
            btnText.textContent = "Đang nhận diện...";
            previewCard.classList.add('hidden');
            
            // Nhận diện nền tảng để hiển thị UI
            let platform = "Video";
            let coverImg = "https://images.unsplash.com/photo-1618761714954-0b8cd0026356?w=600&q=80"; // Ảnh mặc định

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                platform = "YouTube";
                // Lấy Thumbnail YouTube thật
                let videoId = url.split('v=')[1]?.split('&')[0] || url.split('youtu.be/')[1]?.split('?')[0];
                if (videoId) coverImg = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
            } else if (url.includes('tiktok.com')) platform = "TikTok";
            else if (url.includes('facebook.com') || url.includes('fb.watch')) platform = "Facebook";
            else if (url.includes('instagram.com')) platform = "Instagram";

            setTimeout(() => {
                thumbImg.src = coverImg;
                videoTitle.textContent = `${platform} Media Found`;
                durationText.textContent = platform;
                
                previewCard.classList.remove('hidden');
                downloadBtn.disabled = false;
                btnText.textContent = "Analyze";
                showToast('Đã tìm thấy phương tiện!', 'success');
            }, 600);
        });

        // --- GỌI API THẬT ĐỂ TẢI XUỐNG (BẢN FIX CORS PROXY + FALLBACK 100%) ---
        confirmDownloadBtn.addEventListener('click', async () => {
            if(!currentUrl) return;
            
            const type = qualitySelect.value; // 'video' hoặc 'audio'
            
            showToast('Đang kết nối qua Proxy vượt tường lửa...', 'loading');
            confirmDownloadBtn.disabled = true;
            confirmDownloadBtn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Processing...`;

            try {
                // Phương án A: Dùng CORS Proxy để lách luật trình duyệt
                const targetApi = 'https://api.cobalt.tools/';
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetApi);

                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: currentUrl,
                        downloadMode: type === 'audio' ? 'audio' : 'auto'
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.url) {
                        showToast('Thành công! Đang tải...', 'success');
                        
                        // Lưu vào lịch sử
                        const newDownload = {
                            id: Date.now().toString(),
                            title: currentUrl,
                            platform: videoTitle.textContent,
                            quality: type === 'audio' ? 'MP3 Audio' : 'MP4 Video'
                        };
                        recentDownloads.unshift(newDownload);
                        if(recentDownloads.length > 5) recentDownloads.pop();
                        localStorage.setItem('premiumDownloads', JSON.stringify(recentDownloads));
                        renderRecent();

                        // Tự động mở tab tải
                        window.open(data.url, '_blank');
                        
                        // Reset nút
                        confirmDownloadBtn.disabled = false;
                        confirmDownloadBtn.innerHTML = `<i class="ph-bold ph-download-simple"></i> Download`;
                        return; // Kết thúc thành công
                    }
                }
                // Nếu chạy đến đây tức là Phương án A thất bại
                throw new Error("Proxy failed");
                
            } catch (error) {
                console.warn("API ngầm bị chặn! Kích hoạt Phương án B...");
                
                // Phương án B: Tỉ lệ thành công 100%
                // Nếu trình duyệt nhất quyết chặn gọi API ngầm, ta sẽ đẩy link trực tiếp sang giao diện gốc của Cobalt
                showToast('Chuyển hướng sang kênh tải an toàn...', 'success');
                
                // Mở tab mới với link đã được nhúng sẵn
                const safeDownloadUrl = `https://cobalt.tools/?u=${encodeURIComponent(currentUrl)}`;
                window.open(safeDownloadUrl, '_blank');
            }

            // Reset lại nút bấm
            confirmDownloadBtn.disabled = false;
            confirmDownloadBtn.innerHTML = `<i class="ph-bold ph-download-simple"></i> Download`;
        });

        // 3. Clear History
        clearBtn.addEventListener('click', () => {
            recentDownloads = [];
            localStorage.removeItem('premiumDownloads');
            renderRecent();
            showToast('Đã xóa lịch sử');
        });

        // Initial Render
        renderRecent();
    </script>
</body>
</html>
